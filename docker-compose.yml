version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: colaba-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: colaba
      POSTGRES_PASSWORD: colaba
      POSTGRES_DB: colaba_ltv
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: colaba-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
